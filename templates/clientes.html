{% extends "base.html" %}
{% block titulo_pagina %}Clientes{% endblock %}
{% block encabezado %}Gestión de Clientes{% endblock %}
{% block contenido %}
<form method="post" action="{{ url_for('crear_cliente') }}">
    <input type="text" name="codigo" placeholder="Código" required>
    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="email" name="correo" placeholder="Correo" required>
    <input type="text" name="telefono" placeholder="Teléfono" required>
    <button type="submit">Crear</button>
</form>

<table border="1" cellpadding="5" cellspacing="0" style="margin:20px auto;">
<thead><tr><th>Código</th><th>Nombre</th><th>Correo</th><th>Teléfono</th><th>Acciones</th></tr></thead>
<tbody>
{% for c in clientes %}
<tr>
<td>{{ c.codigo }}</td><td>{{ c.nombre }}</td><td>{{ c.correo }}</td><td>{{ c.telefono }}</td>
<td><form method="post" action="{{ url_for('eliminar_cliente', codigo=c.codigo) }}"><button type="submit">Eliminar</button></form></td>
</tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
