{% extends "base.html" %}
{% block titulo_pagina %}Empresas{% endblock %}
{% block encabezado %}Gestión de Empresas{% endblock %}
{% block contenido %}
<form method="post" action="{{ url_for('crear_empresa') }}">
    <input type="text" name="nit" placeholder="NIT" required>
    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="text" name="direccion" placeholder="Dirección" required>
    <input type="text" name="telefono" placeholder="Teléfono" required>
    <button type="submit">Crear</button>
</form>

<table border="1" cellpadding="5" cellspacing="0" style="margin:20px auto;">
<thead><tr><th>NIT</th><th>Nombre</th><th>Dirección</th><th>Teléfono</th><th>Acciones</th></tr></thead>
<tbody>
{% for e in empresas %}
<tr>
<td>{{ e.nit }}</td><td>{{ e.nombre }}</td><td>{{ e.direccion }}</td><td>{{ e.telefono }}</td>
<td><form method="post" action="{{ url_for('eliminar_empresa', nit=e.nit) }}"><button type="submit">Eliminar</button></form></td>
</tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
